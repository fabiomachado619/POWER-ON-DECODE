services:
  db:
    image: postgres:16-alpine
    container_name: podt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: power_on_decode
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d power_on_decode"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: podt-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      APP_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/power_on_decode?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-secret-in-production}
      SESSION_COOKIE_NAME: podt_session
      SESSION_MAX_AGE: 604800
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:-change-this-webhook-secret-in-production}
      PAYMENT_PRODUCT_MAP: ${PAYMENT_PRODUCT_MAP:-prod_ssangyong:ssangyong,prod_volkswagen:volkswagen,prod_fiat:fiat,prod_jeep-fiat-scanner:jeep-fiat-scanner}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@powerondecode.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin@123456}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Administrador}
    ports:
      - "3000:3000"

  migrate:
    image: node:20-alpine
    container_name: podt-migrate
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/power_on_decode?schema=public
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@powerondecode.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin@123456}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Administrador}
    command: >
      sh -c "npm install &&
      npx prisma db push &&
      npx tsx prisma/seed-production.ts"
    profiles:
      - setup

volumes:
  postgres_data:
